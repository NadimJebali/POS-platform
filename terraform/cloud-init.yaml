#cloud-config
# Bootstraps the droplet with everything needed to run the stack — but NO secrets.
# Docker is installed via the official convenience script (reliable across releases;
# the apt docker packages vary by Ubuntu version). The deploy workflow also self-heals
# these if cloud-init hasn't finished, so timing/failures here aren't fatal.
package_update: true
packages:
  - git
  - sqlite3
  - awscli
  - curl
runcmd:
  - [sh, -c, "curl -fsSL https://get.docker.com | sh"]
  - systemctl enable --now docker
  - [git, clone, "https://github.com/NadimJebali/POS-platform.git", /root/pos-platform]
