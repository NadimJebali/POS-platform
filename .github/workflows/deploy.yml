name: deploy

# Build the image in CI, push it to Docker Hub, then have the (already-provisioned)
# droplet pull and run it — no building on the small droplet. Infra is separate
# (infra.yml). Runs on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pos-platform:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pos-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ vars.DOMAIN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          # Written into the droplet's .env (single-line \n-escaped PEM; env_file
          # passes it literally and the server un-escapes \n).
          LICENSE_PRIVATE_KEY: ${{ secrets.LICENSE_PRIVATE_KEY }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s\n' "$SSH_KEY" > deploy_key
          chmod 600 deploy_key
          ssh-keyscan -H "$HOST" >> known_hosts 2>/dev/null

          # Build the droplet .env locally (IMAGE pins this exact build), copy it up.
          # GitHub masks these secret values in logs.
          {
            echo "DOMAIN=$HOST"
            echo "IMAGE=$DOCKERHUB_USERNAME/pos-platform:$IMAGE_TAG"
            echo "LICENSE_PRIVATE_KEY=$LICENSE_PRIVATE_KEY"
            echo "ADMIN_PASSWORD_HASH=$ADMIN_PASSWORD_HASH"
          } > env.deploy

          SSH="ssh -i deploy_key -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes"
          scp -i deploy_key -o UserKnownHostsFile=known_hosts env.deploy \
            root@"$HOST":/root/pos-platform/.env

          # On the droplet: refresh compose/Caddy config from git, pull the pinned
          # (public) image, and restart. No docker login needed — the image is public,
          # and it contains only code that's already public on GitHub.
          $SSH root@"$HOST" 'set -euo pipefail
            cd /root/pos-platform
            git pull --ff-only
            chmod 600 .env
            docker compose pull
            docker compose up -d'

          for i in $(seq 1 10); do
            if curl -fsS "https://$HOST/health" >/dev/null; then echo "healthy"; break; fi
            echo "waiting for health ($i)"; sleep 6
            [ "$i" = 10 ] && { echo "health check failed"; exit 1; }
          done

          rm -f deploy_key env.deploy
