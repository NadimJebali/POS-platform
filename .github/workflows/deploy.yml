name: deploy

# Build the image in CI, push it to Docker Hub, then have the (already-provisioned)
# droplet pull and run it — no building on the small droplet. Infra is separate
# (infra.yml). Runs on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/pos-platform:latest
            ${{ vars.DOCKERHUB_USERNAME }}/pos-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ vars.DOMAIN }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          # Written into the droplet's .env (single-line \n-escaped PEM; env_file
          # passes it literally and the server un-escapes \n).
          LICENSE_PRIVATE_KEY: ${{ secrets.LICENSE_PRIVATE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s\n' "$SSH_KEY" > deploy_key
          chmod 600 deploy_key

          # Preflight: the droplet must exist and be reachable over SSH. If it isn't,
          # fail with an actionable message instead of a silent errexit from ssh-keyscan.
          ssh-keyscan -T 10 -H "$HOST" > known_hosts 2>/dev/null || true
          if [ ! -s known_hosts ]; then
            echo "::error::Can't reach $HOST over SSH. Provision the server first: run the 'infra' workflow (terraform apply) to create the droplet, reserved IP, and the pos DNS record, then wait ~2 min for cloud-init. See DEPLOY.md."
            exit 1
          fi

          # Build the droplet .env locally (IMAGE pins this exact build), copy it up.
          # GitHub masks these secret values in logs.
          {
            echo "DOMAIN=$HOST"
            echo "IMAGE=$DOCKERHUB_USERNAME/pos-platform:$IMAGE_TAG"
            echo "LICENSE_PRIVATE_KEY=$LICENSE_PRIVATE_KEY"
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
          } > env.deploy

          SSH="ssh -i deploy_key -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes"

          # Wait for first-boot provisioning, then make sure Docker, git, and the repo
          # are actually present — the deploy self-heals rather than depending on
          # cloud-init having succeeded.
          $SSH root@"$HOST" 'set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            cloud-init status --wait >/dev/null 2>&1 || true
            command -v git >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y -qq git; }
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            if [ ! -d /root/pos-platform/.git ]; then
              rm -rf /root/pos-platform
              git clone https://github.com/NadimJebali/POS-platform.git /root/pos-platform
            fi'

          # Copy the env file up (the directory is guaranteed to exist now).
          scp -i deploy_key -o UserKnownHostsFile=known_hosts env.deploy \
            root@"$HOST":/root/pos-platform/.env

          # Refresh compose/Caddy config from git, pull the pinned (public) image,
          # and restart. No docker login needed — the image is public.
          $SSH root@"$HOST" 'set -euo pipefail
            cd /root/pos-platform
            git pull --ff-only
            chmod 600 .env
            docker compose pull
            docker compose up -d'

          for i in $(seq 1 10); do
            if curl -fsS "https://$HOST/health" >/dev/null; then echo "healthy"; break; fi
            echo "waiting for health ($i)"; sleep 6
            [ "$i" = 10 ] && { echo "health check failed"; exit 1; }
          done

          rm -f deploy_key env.deploy
