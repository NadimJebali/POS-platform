# Deployment stack for the DigitalOcean droplet: the Node license server behind Caddy
# (which handles automatic TLS for $DOMAIN). SQLite lives on a named volume so data
# survives container rebuilds. `docker compose up -d` after populating .env.
services:
  api:
    # In CI the image is built and pushed, and IMAGE is set in .env so the droplet
    # pulls it (`docker compose pull`) rather than building on a small box. Locally,
    # IMAGE is unset so `docker compose up --build` builds `pos-platform:local`.
    build: .
    image: ${IMAGE:-pos-platform:local}
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - DB_PATH=/data/pos-platform.db
    # Bind-mount ./data so the SQLite file is directly reachable on the host for the
    # nightly backup (scripts/backup.sh). ./data is gitignored.
    volumes:
      - ./data:/data
    expose:
      - '3000'

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

volumes:
  caddy-data:
  caddy-config:
